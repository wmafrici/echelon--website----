<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Echelon — Completing sign in</title>
<style>
  body {
    margin: 0; padding: 0; background: #050506; color: #f4f4f6;
    display: flex; align-items: center; justify-content: center; min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Helvetica, Arial, sans-serif;
  }
  .loader {
    text-align: center;
  }
  .spinner {
    width: 40px; height: 40px; border: 2px solid rgba(255,255,255,0.2);
    border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite;
    margin: 0 auto 24px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  p { font-size: 15px; color: #a6a6ae; }
  .error { color: #ef4444; }
</style>
</head>
<body>

<div class="loader">
  <div class="spinner"></div>
  <p id="status">Completing sign in...</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0"></script>
<script>
  const SUPABASE_URL = 'https://tekhbwqvyhsdgqbcfnts.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRla2hid3F2eWhzZGdxYmNmbnRzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5MTI0MjIsImV4cCI6MjA5NjQ4ODQyMn0.Eu_trLPpyJmxbbLVL3lUQCqt8xLL7c_6rOISEeWOlzw';

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  async function handleCallback() {
    try {
      // Get the current session
      const { data: { session }, error } = await supabase.auth.getSession();
      
      if (error) {
        console.error('Session error:', error);
        document.getElementById('status').textContent = 'Sign in failed. Redirecting...';
        document.getElementById('status').classList.add('error');
        setTimeout(() => {
          window.location.href = 'auth.html';
        }, 2000);
        return;
      }

      if (session) {
        // Successfully signed in via OAuth
        document.getElementById('status').textContent = 'Welcome! Redirecting to your account...';
        setTimeout(() => {
          window.location.href = '/app';
        }, 1500);
      } else {
        // No session, redirect back to auth
        document.getElementById('status').textContent = 'Redirecting...';
        setTimeout(() => {
          window.location.href = 'auth.html';
        }, 1500);
      }
    } catch (err) {
      console.error('Callback error:', err);
      document.getElementById('status').textContent = 'An error occurred. Redirecting...';
      document.getElementById('status').classList.add('error');
      setTimeout(() => {
        window.location.href = 'auth.html';
      }, 2000);
    }
  }

  // Start the callback process immediately
  handleCallback();
</script>

</body>
</html>
