  <script src="echelon-config.js"></script>
  <script>
    const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    // ---------- Living spider-web background ----------
    (function () {
      const canvas = document.getElementById('bg-canvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      let w = 0, h = 0, dpr = 1, raf = null;
      let verts = [], springs = [], hub = { x: 0, y: 0 };
      const mouse = { x: -9999, y: -9999, active: false };
      const SPOKES = 16, RINGS = 9, REACH = 160;

      function resize() {
        dpr = Math.min(window.devicePixelRatio || 1, 2);
        w = canvas.clientWidth; h = canvas.clientHeight;
        canvas.width = Math.round(w * dpr); canvas.height = Math.round(h * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }
      function build() {
        hub.x = w * 0.82; hub.y = h * 0.20;
        const far = Math.hypot(Math.max(hub.x, w - hub.x) + 90, Math.max(hub.y, h - hub.y) + 90);
        const maxR = far * 1.1;
        // per-spoke angular jitter — real orb webs are never perfectly even
        const angJit = new Array(SPOKES).fill(0).map(() => (Math.random() - 0.5) * 0.12);
        verts = [];
        for (let r = 0; r < RINGS; r++) {
          const t = r / (RINGS - 1);
          const ringRad = maxR * Math.pow(t, 1.35);
          for (let s = 0; s < SPOKES; s++) {
            const ang = (s / SPOKES) * Math.PI * 2 + angJit[s] + (Math.random() - 0.5) * 0.015;
            const rad = ringRad * (1 + (Math.random() - 0.5) * 0.06);
            const x = hub.x + Math.cos(ang) * rad, y = hub.y + Math.sin(ang) * rad;
            verts.push({ x: x, y: y, ox: x, oy: y, vx: 0, vy: 0, pinned: (r === 0 || r === RINGS - 1) });
          }
        }
        const idx = (r, s) => r * SPOKES + ((s + SPOKES) % SPOKES);
        springs = [];
        for (let r = 0; r < RINGS; r++) {
          for (let s = 0; s < SPOKES; s++) {
            if (r < RINGS - 1) { const a = verts[idx(r, s)], b = verts[idx(r + 1, s)]; springs.push({ a: a, b: b, len: Math.hypot(a.x - b.x, a.y - b.y) }); }     // radial threads
            if (r > 0)         { const a = verts[idx(r, s)], b = verts[idx(r, s + 1)]; springs.push({ a: a, b: b, len: Math.hypot(a.x - b.x, a.y - b.y) }); } // ring threads
          }
        }
      }
      function step() {
        const K = 0.02, KR = 0.011, DAMP = 0.9;
        for (const sp of springs) {
          const dx = sp.b.x - sp.a.x, dy = sp.b.y - sp.a.y;
          const d = Math.hypot(dx, dy) || 0.0001;
          const f = ((d - sp.len) / d) * K, fx = dx * f, fy = dy * f;
          if (!sp.a.pinned) { sp.a.vx += fx; sp.a.vy += fy; }
          if (!sp.b.pinned) { sp.b.vx -= fx; sp.b.vy -= fy; }
        }
        for (const v of verts) {
          if (v.pinned) continue;
          v.vx += (v.ox - v.x) * KR; v.vy += (v.oy - v.y) * KR;   // tension back to rest
          if (mouse.active) {
            const dx = v.x - mouse.x, dy = v.y - mouse.y, d = Math.hypot(dx, dy);
            if (d < REACH && d > 0.01) { const f = (1 - d / REACH); const p = f * f * 5; v.vx += (dx / d) * p; v.vy += (dy / d) * p; }
          }
          v.vx *= DAMP; v.vy *= DAMP; v.x += v.vx; v.y += v.vy;
        }
      }
      function draw() {
        if (!reduce) step();
        ctx.clearRect(0, 0, w, h);
        for (const sp of springs) {
          let o = 0.08;
          if (mouse.active) {
            const mx = (sp.a.x + sp.b.x) / 2 - mouse.x, my = (sp.a.y + sp.b.y) / 2 - mouse.y;
            const dm = Math.hypot(mx, my);
            if (dm < REACH * 1.5) o += (1 - dm / (REACH * 1.5)) * 0.42;
          }
          ctx.strokeStyle = 'rgba(160,135,235,' + o.toFixed(3) + ')';
          ctx.lineWidth = 0.65;
          ctx.beginPath(); ctx.moveTo(sp.a.x, sp.a.y); ctx.lineTo(sp.b.x, sp.b.y); ctx.stroke();
        }
        if (mouse.active) {
          for (const v of verts) {
            if (Math.hypot(v.x - mouse.x, v.y - mouse.y) < REACH) {
              ctx.fillStyle = 'rgba(214,200,255,0.8)';
              ctx.beginPath(); ctx.arc(v.x, v.y, 1.3, 0, Math.PI * 2); ctx.fill();
            }
          }
        }
        const hg = ctx.createRadialGradient(hub.x, hub.y, 0, hub.x, hub.y, 70);
        hg.addColorStop(0, 'rgba(150,120,235,0.10)'); hg.addColorStop(1, 'rgba(150,120,235,0)');
        ctx.fillStyle = hg; ctx.beginPath(); ctx.arc(hub.x, hub.y, 70, 0, Math.PI * 2); ctx.fill();
      }
      function loop() { draw(); raf = requestAnimationFrame(loop); }
      function start() { resize(); build(); if (raf) cancelAnimationFrame(raf); if (reduce) draw(); else loop(); }
      let rt = null;
      window.addEventListener('resize', () => { clearTimeout(rt); rt = setTimeout(start, 200); });
      if (!reduce) {
        window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; mouse.active = true; }, { passive: true });
        window.addEventListener('mouseout', (e) => { if (!e.relatedTarget) mouse.active = false; }, { passive: true });
        window.addEventListener('blur', () => { mouse.active = false; });
      }
      start();
    })();

    // ---------- Nav scroll state ----------
    const nav = document.getElementById('nav');
    const onScroll = () => nav.classList.toggle('scrolled', window.scrollY > 12);
    onScroll();
    window.addEventListener('scroll', onScroll, { passive: true });

    // ---------- Scroll reveal ----------
    if (!reduce && 'IntersectionObserver' in window) {
      const io = new IntersectionObserver((entries) => {
        entries.forEach((e) => { if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); } });
      }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });
      document.querySelectorAll('.reveal').forEach((el) => io.observe(el));
    } else {
      document.querySelectorAll('.reveal').forEach((el) => el.classList.add('in'));
    }
    // Failsafe: guarantee all content is visible shortly after load, even if a
    // transition stalls or the observer is throttled.
    setTimeout(() => document.documentElement.classList.add('reveal-done'), 2600);

    // ---------- Interactive workspace ----------
    (function () {
      const ws = document.getElementById('workspace');
      if (!ws) return;
      const tabs = ws.querySelectorAll('.ws-tab');
      const panels = ws.querySelectorAll('.ws-panel');
      let revDrawn = false, ovAnimated = false;

      function animateOverview() {
        if (ovAnimated) return; ovAnimated = true;
        const bars = document.querySelectorAll('#ovChart .bar');
        bars.forEach((b, i) => { setTimeout(() => { b.style.height = b.dataset.h + '%'; }, 120 + i * 80); });
        const ring = ws.querySelector('.ws-ring .rfill');
        if (ring) {
          const r = 20, circ = 2 * Math.PI * r;
          ring.style.strokeDasharray = circ.toFixed(2);
          ring.style.strokeDashoffset = circ.toFixed(2);
          setTimeout(() => { ring.style.strokeDashoffset = (circ * (1 - parseFloat(ring.dataset.pct))).toFixed(2); }, 300);
        }
      }
      function drawRevenue() {
        if (revDrawn) return; revDrawn = true;
        const graph = document.getElementById('revGraph');
        const line = graph.querySelector('.gline');
        const len = line.getTotalLength();
        line.style.strokeDasharray = len.toFixed(1);
        line.style.strokeDashoffset = len.toFixed(1);
        // force reflow then animate
        void line.getBoundingClientRect();
        requestAnimationFrame(() => { line.style.strokeDashoffset = '0'; graph.classList.add('drawn'); });
      }

      function selectTab(name) {
        tabs.forEach(t => t.classList.toggle('on', t.dataset.tab === name));
        panels.forEach(p => p.classList.toggle('on', p.dataset.panel === name));
        if (name === 'overview') animateOverview();
        if (name === 'revenue') drawRevenue();
      }
      tabs.forEach(t => t.addEventListener('click', () => selectTab(t.dataset.tab)));

      // Network connect / pass interactions
      ws.querySelectorAll('.ws-member').forEach(m => {
        const connect = m.querySelector('.ws-btn.connect');
        const pass = m.querySelector('.ws-btn.pass');
        connect && connect.addEventListener('click', () => {
          connect.textContent = 'Requested'; connect.classList.add('gone'); pass.classList.add('gone');
        });
        pass && pass.addEventListener('click', () => {
          m.style.transition = 'opacity .3s ease, transform .3s ease';
          m.style.opacity = '0.35';
        });
      });

      // Animate overview bars + ring when the workspace scrolls into view
      if (!reduce && 'IntersectionObserver' in window) {
        const io = new IntersectionObserver((entries) => {
          entries.forEach(e => { if (e.isIntersecting) { animateOverview(); io.disconnect(); } });
        }, { threshold: 0.3 });
        io.observe(ws);
      } else {
        document.querySelectorAll('#ovChart .bar').forEach(b => b.style.height = b.dataset.h + '%');
        const ring = ws.querySelector('.ws-ring .rfill');
        if (ring) { const circ = 2 * Math.PI * 20; ring.style.strokeDasharray = circ; ring.style.strokeDashoffset = circ * (1 - parseFloat(ring.dataset.pct)); }
      }

      // Feature nav popups
      const featpop = document.getElementById('featpop');
      const cards = document.querySelectorAll('#featnav .featcard');
      let activeCard = null;
      cards.forEach(c => {
        c.addEventListener('click', () => {
          if (activeCard === c) {
            c.classList.remove('active'); featpop.classList.remove('show'); activeCard = null; return;
          }
          cards.forEach(x => x.classList.remove('active'));
          c.classList.add('active'); activeCard = c;
          featpop.innerHTML = c.dataset.desc; featpop.classList.add('show');
        });
      });
    })();

    // ---------- Echelon Index ----------
    const indexData = [
      { name: 'Sofia Reyes',     loc: 'San Francisco, US', venture: 'Lumen Health',  score: 96.4 },
      { name: 'Kai Nakamura',    loc: 'Tokyo, JP',         venture: 'Orbit Labs',    score: 95.1 },
      { name: 'Amara Okafor',    loc: 'Lagos, NG',         venture: 'Paystream',     score: 93.8 },
      { name: 'Noah Bennett',    loc: 'Melbourne, AU',     venture: 'Forge AI',      score: 92.6 },
      { name: 'Elena Vasquez',   loc: 'Barcelona, ES',     venture: 'Coastal',       score: 91.3 },
      { name: 'Dev Patel',       loc: 'Bengaluru, IN',     venture: 'Nimbus',        score: 90.0 },
      { name: 'Mia Laurent',     loc: 'Paris, FR',         venture: 'Atelier',       score: 88.7 },
      { name: 'Lucas Andersen',  loc: 'Copenhagen, DK',    venture: 'Vela',          score: 87.4 },
      { name: 'Zara Khan',       loc: 'Dubai, AE',         venture: 'Mirage',        score: 86.2 },
      { name: 'Oliver Grant',    loc: 'London, UK',        venture: 'Tempo',         score: 85.0 },
    ];

    const board = document.getElementById('board');
    const rowEls = indexData.map((d, i) => {
      const row = document.createElement('div');
      row.className = 'lrow';
      const rank = String(i + 1).padStart(2, '0');
      row.innerHTML =
        '<div class="rank">' + rank + '</div>' +
        '<div class="who">' +
          '<div class="nameline"><span class="name">' + d.name + '</span>' +
          '<span class="verified" title="Verified">✓</span></div>' +
          '<div class="meta"><span class="loc">' + d.loc + '</span>' +
          '<span class="sep"></span><span class="venture">' + d.venture + '</span></div>' +
        '</div>' +
        '<div class="score-wrap">' +
          '<div class="score" data-score="' + d.score.toFixed(1) + '">' + d.score.toFixed(1) + '</div>' +
          '<div class="track"><div class="fill"></div></div>' +
        '</div>';
      board.appendChild(row);
      row._score = d.score;
      return row;
    });

    function fillRow(row) {
      const fill = row.querySelector('.fill');
      const pct = Math.max(6, Math.min(100, (row._score - 80) / 20 * 100));
      fill.style.width = pct.toFixed(1) + '%';
    }

    let indexStarted = false;
    function startIndex() {
      if (indexStarted) return;
      indexStarted = true;
      rowEls.forEach((row, i) => {
        setTimeout(() => { row.classList.add('in'); fillRow(row); }, 240 + i * 80);
      });
      if (!reduce) setTimeout(runLive, 1800 + rowEls.length * 80);
    }

    function runLive() {
      const tick = () => {
        const row = rowEls[Math.floor(Math.random() * rowEls.length)];
        row._score = Math.min(99.9, row._score + 0.1);
        row.querySelector('.score').textContent = row._score.toFixed(1);
        fillRow(row);
        row.classList.add('flash');
        setTimeout(() => row.classList.remove('flash'), 1400);
      };
      setInterval(tick, 4000);
    }

    if (!reduce && 'IntersectionObserver' in window) {
      const iio = new IntersectionObserver((entries) => {
        entries.forEach((e) => { if (e.isIntersecting) { startIndex(); iio.disconnect(); } });
      }, { threshold: 0.18 });
      iio.observe(document.getElementById('board'));
    } else {
      rowEls.forEach((row) => { row.classList.add('in'); fillRow(row); });
    }

    // ---------- Waitlist — Supabase (when configured) + local fallback ----------
    const WAITLIST_KEY = 'echelon_waitlist_v1';
    const SB = window.ECHELON_SUPABASE || {};
    const SB_ON = !!window.ECHELON_CONFIGURED;

    function saveSignupLocal(email) {
      let list = [];
      try { list = JSON.parse(localStorage.getItem(WAITLIST_KEY)) || []; } catch (e) { list = []; }
      const exists = list.some((s) => s.email.toLowerCase() === email.toLowerCase());
      if (!exists) {
        list.push({
          id: 'w_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
          email: email, status: 'new', notes: '', ts: Date.now(), source: 'Landing page',
        });
        try { localStorage.setItem(WAITLIST_KEY, JSON.stringify(list)); } catch (e) {}
      }
      return !exists;
    }

    function saveSignupRemote(email) {
      return fetch(SB.url + '/rest/v1/waitlist', {
        method: 'POST',
        headers: {
          'apikey': SB.anonKey,
          'Authorization': 'Bearer ' + SB.anonKey,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal',
        },
        body: JSON.stringify([{ email: email, source: 'Landing page' }]),
      }).catch(function () {});
    }

    function saveSignup(email) {
      if (SB_ON) { saveSignupRemote(email); saveSignupLocal(email); }
      else { saveSignupLocal(email); }
    }

    const form = document.getElementById('wlform');
    form.addEventListener('submit', (ev) => {
      ev.preventDefault();
      const email = document.getElementById('wlemail').value.trim();
      const ok = /.+@.+\..+/.test(email);
      if (!ok) {
        const input = document.getElementById('wlemail');
        input.style.borderColor = 'oklch(0.65 0.2 25)';
        input.focus();
        return;
      }
      saveSignup(email);
      form.innerHTML = '<div class="ok"><span class="check">✓</span> You\'re on the list. Welcome to Echelon.</div>';
    });
  </script>
</body>
</html>
